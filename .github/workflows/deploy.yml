# .github/workflows/deploy.yml
# Automatic deployment to server on push to main.
#
# Required secrets (GitHub repo Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    — SSH hostname or IP of the server
#   DEPLOY_USER    — SSH user (e.g. ubuntu, hygie)
#   DEPLOY_SSH_KEY — Private SSH key content (-----BEGIN ... KEY-----)
#   DEPLOY_PATH    — Absolute path to repo on server (e.g. /opt/hygie)
#
# If secrets are not configured, the job is skipped (not failed).
name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy secrets
        id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST secret not set — auto-deploy skipped. Configure secrets in repo Settings to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            make deploy
