services:
  hygie:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: local
    image: hygie:local
    container_name: hygie-local
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data-local:/app/data
    environment:
      - TZ=Europe/Paris
      - HYGIE_ENCRYPTION_KEY=${HYGIE_ENCRYPTION_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
    mem_limit: 1g
    cpus: '2.0'
    healthcheck:
      test: ["CMD", "python3", "/app/backend/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
