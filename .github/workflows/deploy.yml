# .github/workflows/deploy.yml
# Automatic deployment to server on push to main.
# Required secrets (GitHub repo Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    — SSH hostname or IP
#   DEPLOY_USER    — SSH user (e.g. ubuntu, hygie)
#   DEPLOY_SSH_KEY — Private SSH key content
#   DEPLOY_PATH    — Absolute path to repo on server (e.g. /opt/hygie)
name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            make deploy
