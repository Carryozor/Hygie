services:
  hygie:
    image: ghcr.io/votre-user/hygie:latest
    # or for local build:
    # build:
    #   context: .
    #   args:
    #     VERSION: 1.5.0
    container_name: hygie
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "python3", "/app/backend/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
