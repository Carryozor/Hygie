name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Build & Push Docker
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ghcr.io/carryozor/hygie:latest
            ghcr.io/carryozor/hygie:${{ steps.version.outputs.VERSION }}

  release:
    name: GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG (English)
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md (the English source of truth)
          NOTES=$(awk '
            /^## \['"${VERSION}"'\]/ {flag=1; print; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md | tail -n +2)  # skip the header line itself for body
          if [ -z "$NOTES" ]; then
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          {
            echo "NOTES<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES="${{ steps.changelog.outputs.NOTES }}"
          BODY="## Docker

          \`\`\`yaml
          image: ghcr.io/carryozor/hygie:${VERSION}
          \`\`\`

          ## Release Notes

          ${NOTES}

          ---
          🐳 Docker image: \`ghcr.io/carryozor/hygie:${VERSION}\`

          Full details in [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)."

          if gh release view "v${VERSION}" --repo ${{ github.repository }} &>/dev/null; then
            gh release edit "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "$BODY" \
              --repo ${{ github.repository }}
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "$BODY" \
              --repo ${{ github.repository }}
          fi
