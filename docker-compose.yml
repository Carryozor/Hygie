services:
  hygie:
    image: ghcr.io/carryozor/hygie:latest
    container_name: hygie
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Paris
      # Encrypt API keys at rest — recommended for production.
      # 1. Copy .env.example to .env and fill in HYGIE_ENCRYPTION_KEY
      # 2. Generate a key: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Never hardcode the key here — use the .env file instead.
      - HYGIE_ENCRYPTION_KEY=${HYGIE_ENCRYPTION_KEY:-}
      # JWT signing key — auto-generated if not set, but sessions are lost on every restart.
      # Generate: python3 -c "import secrets; print(secrets.token_urlsafe(48))"
      - SECRET_KEY=${SECRET_KEY:-}
      # ── Base de données ──
      # SQLite (défaut)   : laisser DATABASE_URL vide
      # MariaDB embarquée : utiliser docker-compose.embedded-mariadb.yml
      #                     docker compose -f docker-compose.yml -f docker-compose.embedded-mariadb.yml up
      # MariaDB externe   : DATABASE_URL=mysql+aiomysql://user:pass@host:3306/hygie
      # MariaDB conteneur : DATABASE_URL=mysql+aiomysql://hygie:${DB_MARIADB_PASSWORD}@mariadb:3306/hygie
      - DATABASE_URL=${DATABASE_URL:-}
      - EMBEDDED_MARIADB=${EMBEDDED_MARIADB:-false}
      - EMBEDDED_MARIADB_PASSWORD=${EMBEDDED_MARIADB_PASSWORD:-}
    mem_limit: 1g     # 512m is too tight for large libraries; 1-2g recommended in production
    cpus: '2.0'
    healthcheck:
      test: ["CMD", "python3", "/app/backend/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      mariadb:
        condition: service_healthy
        required: false

  mariadb:
    image: mariadb:11
    profiles: [mariadb]
    restart: unless-stopped
    # Give MariaDB 60 s to flush and shut down before Docker sends SIGKILL (default = 10 s).
    # Without this, abrupt kills corrupt tc.log and the container refuses to start until
    # tc.log is deleted manually. Hygie does not use XA transactions and runs with
    # log_bin=OFF, so tc.log holds nothing recoverable. The entrypoint wrapper below
    # deletes it before each start as a second safeguard for unexpected crashes (OOM,
    # power loss, host reboot).
    stop_grace_period: 60s
    entrypoint: ["bash", "-c", "rm -f /var/lib/mysql/tc.log && exec docker-entrypoint.sh mariadbd"]
    environment:
      MYSQL_DATABASE: hygie
      MYSQL_USER: hygie
      MYSQL_PASSWORD: ${DB_MARIADB_PASSWORD:?Set DB_MARIADB_PASSWORD in your .env file — do not use defaults}
      MYSQL_ROOT_PASSWORD: ${DB_MARIADB_ROOT_PASSWORD:?Set DB_MARIADB_ROOT_PASSWORD in your .env file — do not use defaults}
    volumes:
      - hygie_mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "hygie", "-p${DB_MARIADB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hygie_mariadb:
