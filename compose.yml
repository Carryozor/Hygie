#version: "3.8"

services:
  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # --- Configuration ProtonVPN ---
      - TZ=${TZ}
      - UPDATER_PERIOD=24h
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - BLOCK_MALICIOUS=off
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=Netherlands
      # --- Port Forwarding Magique ---
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      # Script "Sidecar" : Met à jour le port dans qBit automatiquement
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -q -O- --retry-connrefused --post-data "{\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" "http://127.0.0.1:8080/api/v2/app/setPreferences" 2>&1'
      # Le nettoyage en cas d'arrêt (Optionnel mais propre)
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c 'wget -q -O- --retry-connrefused --post-data "{\"listen_port\":0,\"current_network_interface\":\"lo\"}" "http://127.0.0.1:8080/api/v2/app/setPreferences" 2>&1'
    networks:
      - cloudflare-tunnel
    ports:
      - 8080:8080 # Accès qBittorrent UI
      - 7476:7476 # Accès Qui UI
    labels:
      - "com.getarcaneapp.arcane.image=qmcgaw/gluetun:v3"
    volumes:
      - ${CONFIG_DIR}/gluetun:/gluetun
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "ip addr show tun0 | grep -q 'inet' || ip addr show wg0 | grep -q 'inet' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 90s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    # Isolation Réseau Totale : Utilise le réseau de Gluetun
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_DIR}/qbittorrent:/config
      - ${DATA_DIR}/torrents/downloads:/data/torrents/downloads # Mapping vital pour les hardlinks
      - ${DATA_DIR}/storage:/data/storage
    restart: always
    depends_on:
       - gluetun
    healthcheck:
      # Check that the WebUI responds without embedding credentials in the
      # command — credentials in CMD-SHELL are visible via `docker inspect`.
      test: ["CMD-SHELL", "curl -f -s --max-time 8 http://127.0.0.1:8080/ || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 8
      start_period: 60s

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # Configuration de la connexion à qBit (Localhost car même réseau)
      - QUI__HOST=0.0.0.0
      - QUI__PORT=7476
    volumes:
      - ${CONFIG_DIR}/qui:/config
    restart: always
    depends_on:
      - gluetun

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - cloudflare-tunnel
    volumes:
      - ${CONFIG_DIR}/prowlarr:/config
    ports:
      - 9696:9696
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 10 http://127.0.0.1:9696/ping || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 6
      start_period: 45s

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - cloudflare-tunnel
    volumes:
      - ${CONFIG_DIR}/sonarr:/config
      - ${DATA_DIR}:/data
    ports:
      - 8989:8989
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 10 http://127.0.0.1:8989/ping || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 6
      start_period: 50s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - cloudflare-tunnel
    volumes:
      - ${CONFIG_DIR}/radarr:/config
      - ${DATA_DIR}:/data
    ports:
      - 7878:7878
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 10 http://127.0.0.1:7878/ping || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 6
      start_period: 50s

#  recyclarr:
#    image: recyclarr/recyclarr
#    container_name: recyclarr
#    user: ${PUID}:${PGID}
#    volumes:
#      - ${CONFIG_DIR}/recyclarr:/config

  qbit_manage:
    image: ghcr.io/stuffanthings/qbit_manage:latest
    container_name: qbit_manage
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - QBT_SCHEDULE=30
      - QBT_WEB_SERVER=true
    networks:
      - cloudflare-tunnel
    ports:
      - 8181:8080
    volumes:
      - ${CONFIG_DIR}/qbit_manage:/config
      - ${DATA_DIR}:/data
    restart: unless-stopped

  emby:
    image: emby/embyserver:beta
    container_name: emby
    runtime: nvidia
    environment:
      - UID=1001
      - GID=1002
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video,graphics
    networks:
      - cloudflare-tunnel
    volumes:
      - ${CONFIG_DIR}/emby:/config
      - ${DATA_DIR}/media:/data/media
    ports:
      - 8096:8096
      - 8920:8920
    restart: on-failure

  seerr:
    image: ghcr.io/seerr-team/seerr:develop
    user: ${PUID}:${PGID}
    container_name: seerr
    init: true
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
    networks:
      - cloudflare-tunnel
    ports:
      - 5055:5055
    volumes:
      - ${CONFIG_DIR}/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: always

  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    environment:
      - TZ=${TZ}
    user: ${PUID}:${PGID}
    volumes:
      - ${CONFIG_DIR}/autobrr:/config
    ports:
      - 7474:7474
    restart: always
    networks:
      - cloudflare-tunnel

  hygie:
    image: ghcr.io/carryozor/hygie:latest
    container_name: hygie
    restart: unless-stopped
    user: ${PUID}:${PGID}
    ports:
      - "8000:8000"
    volumes:
      - ./hygie/data:/app/data
    environment:
      - DB_PATH=/app/data/hygie.db
      - TZ=Europe/Paris
      - HYGIE_ENCRYPTION_KEY=${HYGIE_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "python3", "/app/backend/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cloudflare-tunnel

  cross-seed:
    image: crossseed/cross-seed
    container_name: cross-seed
    user: ${PUID}:${PGID}
    command: daemon
    volumes:
      - ${CONFIG_DIR}/cross-seed:/config
      - ${DATA_DIR}:/data
    restart: unless-stopped
    networks:
      - cloudflare-tunnel

  beszel-hub:
    image: henrygd/beszel
    container_name: beszel
    ports:
      - 8090:8090
    volumes:
      - ${CONFIG_DIR}/beszel:/beszel_data
    restart: always
    networks:
      - cloudflare-tunnel

  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./beszel_agent_data:/var/lib/beszel-agent
    environment:
      LISTEN: 45876
      KEY: ${Key_Beszel}
      TOKEN: ${Token_Beszel}
      HUB_URL: http://docker:8090
    networks:
      - cloudflare-tunnel

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: ${PUID}:${PGID}
    networks:
      - cloudflare-tunnel
    ports:
      - "8082:80"
    volumes:
      - /data:/srv
#      - /data:/flux/vault
      - ${CONFIG_DIR}/filebrowser:/database
      - ${CONFIG_DIR}/filebrowser:/config

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    environment:
      PUID: 1001
      PGID: 1001
    ports:
      - 8084:8084
    restart: unless-stopped
    networks:
      - cloudflare-tunnel
    volumes:
      - /data/storage/grimmory/bookdrop:/books # Default destination for book downloads
      - ${CONFIG_DIR}:/config # App configuration
      # Required for torrent / usenet - path must match your download client's volume exactly
      - /data/torrents/downloads/:/data/torrents/downloads/

networks:
  cloudflare-tunnel:
    external: true
